<html lang="en" class="scroll-smooth">
<head>

    name="description"
    content="Precipice is under construction and coming soon."
  >
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            abyss: "#09070c",
            surface: "#130d18",
            panel: "#1a1022",
            ink: "#f8f3ff",
            ember: "#ff8a4c",
            violet: "#c93cff",
            sky: "#4ec5ff"
          },
          boxShadow: {
            glow: "0 0 100px rgba(201, 60, 255, 0.16)",
            panel: "0 30px 80px rgba(0, 0, 0, 0.45)"
          },
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"]

        }

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    html {
      scroll-behavior: smooth;
    }

    .precipice-stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      opacity: 0.62;
      mix-blend-mode: screen;
    }

    .precipice-star-layer {
      position: absolute;
      inset: 0;
      transform: translate3d(0, calc(var(--scroll-y, 0px) * var(--parallax, 0)), 0);
      transition: transform 100ms linear;
      will-change: transform;
      clip-path: inset(0 0 0 0 round 0);
    }

    .precipice-star {
      position: absolute;
      display: block;
      aspect-ratio: 1;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      opacity: 0.18;
      filter:
        drop-shadow(0 0 11px rgba(201, 60, 255, 0.38))
        drop-shadow(0 0 22px rgba(110, 72, 255, 0.18));
    }

    .precipice-star.purple {
      background: linear-gradient(180deg, rgba(245, 233, 255, 0.98), rgba(201, 60, 255, 0.9));
    }

    .precipice-star.small {
      width: 0.8rem;
    }

    .precipice-star.medium {
      width: 1.1rem;
    }

    .precipice-star.large {
      width: 1.4rem;
    }

    .precipice-star.twinkle {
      animation: precipice-star-twinkle 6.8s ease-in-out infinite;
    }

    @keyframes precipice-star-twinkle {
      0%, 100% {
        opacity: 0.12;
        transform: scale(0.96);
      }
      50% {
        opacity: 0.3;
        transform: scale(1);
      }
    }

    .precipice-stars .precipice-star-layer:nth-child(1) .precipice-star:nth-child(-n + 4) {
      left: auto;
      right: auto;
    }

    @keyframes rise-in {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(12, 7, 14, 0.82);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(14px);
    }

    .topbar-inner {
      width: min(1180px, calc(100% - 2rem));
      margin: 0 auto;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      animation: rise-in 640ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .brand {
      flex: 0 0 auto;
    }

    .brand-logo {
      width: min(170px, 32vw);
      height: auto;
      object-fit: contain;
    }

    .topnav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 1rem;
    }

    .nav-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.95rem 1.35rem;
      border-radius: 999px;
      color: #f8f3ff;
      background: linear-gradient(180deg, rgba(255, 138, 76, 0.22) 0%, rgba(201, 60, 255, 0.18) 100%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.3);
      font-size: 0.92rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      transition: transform 180ms ease, filter 180ms ease, box-shadow 180ms ease;
    }

    .nav-pill:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
      box-shadow: 0 14px 24px rgba(0, 0, 0, 0.22);
    }

    .project-dropdown {
      position: relative;
    }

    .project-dropdown-toggle {
      gap: 0.55rem;
    }

    .project-dropdown-toggle .chevron {
      width: 0.65rem;
      height: 0.65rem;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: translateY(-0.08rem) rotate(45deg);
      transition: transform 180ms ease;
    }

    .project-dropdown.open .project-dropdown-toggle .chevron {
      transform: translateY(0.08rem) rotate(225deg);
    }

    .project-menu {
      position: absolute;
      top: calc(100% + 0.8rem);
      right: 0;
      z-index: 30;
      min-width: 18rem;
      padding: 0.65rem;
      border-radius: 20px;
      background: rgba(13, 8, 16, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(16px);
    }

    .project-menu[hidden] {
      display: none;
    }

    .project-menu a {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      width: 100%;
      padding: 0.95rem 1rem;
      border-radius: 14px;
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      background: linear-gradient(180deg, rgba(255, 138, 76, 0.16), rgba(201, 60, 255, 0.12));
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: transform 180ms ease, filter 180ms ease, border-color 180ms ease;
    }

    .project-menu a + a {
      margin-top: 0.45rem;
    }

    .project-menu a:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
      border-color: rgba(255, 255, 255, 0.16);
    }

    @media (max-width: 720px) {
      .topbar-inner {
        min-height: auto;
        padding: 1rem 0;
        flex-direction: column;
        align-items: center;
      }

      .topnav {
        justify-content: center;
      }

      .nav-pill {
        padding: 0.8rem 1rem;
        font-size: 0.82rem;
      }

      .project-menu {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        min-width: min(18rem, calc(100vw - 2rem));
      }
    }
  </style>
</head>
<body class="bg-abyss font-sans text-ink antialiased">

              Back to Studio
            </a>
            <a href="showcase.html" class="inline-flex items-center justify-center rounded-full border border-white/15 bg-gradient-to-r from-ember/30 to-violet/30 px-6 py-3 text-sm font-semibold uppercase tracking-[0.18em] text-white transition hover:-translate-y-0.5 hover:brightness-110">

  </div>
  <script>
    const precipiceStars = document.querySelector(".precipice-stars");
    if (precipiceStars) {
      let starFrame = 0;
      const updateStars = () => {
        starFrame = 0;
        precipiceStars.style.setProperty("--scroll-y", `${window.scrollY}px`);
      };

      const requestStarUpdate = () => {
        if (starFrame) return;
        starFrame = window.requestAnimationFrame(updateStars);
      };

      updateStars();
      window.addEventListener("scroll", requestStarUpdate, { passive: true });
      window.addEventListener("resize", requestStarUpdate);
    }

    const dropdown = document.querySelector(".project-dropdown");
    const dropdownToggle = document.querySelector(".project-dropdown-toggle");
    const dropdownMenu = document.querySelector(".project-menu");

    if (dropdown && dropdownToggle && dropdownMenu) {
      const closeMenu = () => {
        dropdown.classList.remove("open");
        dropdownToggle.setAttribute("aria-expanded", "false");
        dropdownMenu.hidden = true;
      };

      const toggleMenu = () => {
        const isOpen = dropdown.classList.toggle("open");
        dropdownToggle.setAttribute("aria-expanded", String(isOpen));
        dropdownMenu.hidden = !isOpen;
      };

      dropdownToggle.addEventListener("click", (event) => {
        event.stopPropagation();
        toggleMenu();
      });

      dropdownMenu.addEventListener("click", (event) => {
        if (event.target.closest("a")) closeMenu();
      });

      document.addEventListener("click", (event) => {
        if (!dropdown.contains(event.target)) closeMenu();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeMenu();
      });
    }
  </script>
